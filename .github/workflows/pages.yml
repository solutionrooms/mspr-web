name: Deploy GitHub Pages

# Builds the Vite web app in web/ (the live bit-exact-engine demo; will grow into
# the playable game) and publishes it to GitHub Pages. No bootstrap needed: the
# demo imports only src/box2d (no SWF / no game art), so CI needs just devDeps.

on:
  push:
    branches: [main]
    paths:
      - web/**
      - src/**
      - vite.config.ts
      - package.json
      - package-lock.json
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
        env:
          PUPPETEER_SKIP_DOWNLOAD: "true"
      - run: npm run build:web
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist-web
      - id: deployment
        uses: actions/deploy-pages@v4
