name: Deploy GitHub Pages

# Publishes the static landing page in site/ to GitHub Pages.
# Later: swap the artifact path to the Vite web build (dist-web) once the
# renderer can produce a playable build — e.g. add an `npm ci && npm run
# bootstrap && npm run build:web` step and upload `dist-web`.

on:
  push:
    branches: [main]
    paths: [site/**, .github/workflows/pages.yml]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
